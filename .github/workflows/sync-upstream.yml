name: Sync upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config
        run: |
          git config user.name "nascloud"
          git config user.email "nascloud@users.noreply.github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/basketikun/chatgpt2api.git
          git fetch upstream

      - name: Sync main with upstream
        run: |
          git checkout main
          git merge upstream/main --ff-only
          git push origin main

      - name: Rebase production onto main
        run: |
          git checkout production
          git rebase main
          git push origin production --force-with-lease
