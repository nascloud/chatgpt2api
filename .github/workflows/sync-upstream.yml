name: Sync upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: chatgpt2api

permissions:
  contents: write
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Config
        run: |
          git config user.name "nascloud"
          git config user.email "nascloud@users.noreply.github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/basketikun/chatgpt2api.git
          git fetch upstream

      - name: Sync main with upstream
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Create version tag
        continue-on-error: true
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"
          if ! git ls-remote origin "refs/tags/$TAG" | grep -q .; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Rebase production onto main
        run: |
          git checkout production
          git rebase -X theirs main
          git push origin production --force-with-lease

      - name: Trigger Docker build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docker-publish.yml --ref production
