name: Sync upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      build_only:
        description: "Only rebuild the current production branch"
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  IMAGE_NAME: chatgpt2api

permissions:
  contents: write
  packages: write

jobs:
  sync:
    if: ${{ inputs.build_only != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Config
        run: |
          git config user.name "nascloud"
          git config user.email "nascloud@users.noreply.github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/basketikun/chatgpt2api.git
          git fetch upstream
          git fetch origin main:refs/remotes/origin/main production:refs/remotes/origin/production

      - name: Sync main with upstream
        run: |
          git checkout -B main origin/main
          git merge upstream/main --no-edit
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            exit 1
          fi
          git merge-base --is-ancestor upstream/main main
          git push origin main

      - name: Create version tag
        continue-on-error: true
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"
          if ! git ls-remote origin "refs/tags/$TAG" | grep -q .; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Rebase production onto main
        run: |
          git checkout -B production origin/production
          git rebase main
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            exit 1
          fi
          git merge-base --is-ancestor main production
          git push origin production --force-with-lease

  build:
    runs-on: ubuntu-latest
    needs: sync
    if: ${{ always() && (needs.sync.result == 'success' || inputs.build_only == true) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout production for build
        run: |
          git fetch origin production:refs/remotes/origin/production
          git checkout -B production origin/production
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Python dependencies
        run: |
          python -m pip install --upgrade uv
          uv sync --frozen --no-dev --no-install-project

      - name: Validate web build
        working-directory: web
        run: |
          npm install
          NEXT_PUBLIC_APP_VERSION="$(cat ../VERSION)" npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=production
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
