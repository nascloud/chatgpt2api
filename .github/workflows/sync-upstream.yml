name: Sync upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: chatgpt2api

permissions:
  contents: write
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Config
        run: |
          git config user.name "nascloud"
          git config user.email "nascloud@users.noreply.github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/basketikun/chatgpt2api.git
          git fetch upstream

      - name: Sync main with upstream
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Rebase production onto main
        run: |
          git checkout production
          git rebase main
          git push origin production --force-with-lease

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha
            type=raw,value=production,enable=${{ github.ref == 'refs/heads/production' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
